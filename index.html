<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>CampusTask</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
    input, textarea, select, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ═══════════════════════════════════════════════
// FIREBASE REST API — only needs the database URL
// ═══════════════════════════════════════════════
const DB = "https://campustask-8fa3f-default-rtdb.firebaseio.com";

async function dbGet(p) { const r = await fetch(DB+"/"+p+".json"); return r.json(); }
async function dbWrite(p,d) { await fetch(DB+"/"+p+".json", {method:"PUT", body:JSON.stringify(d), headers:{"Content-Type":"application/json"}}); }
async function dbPush(p,d) { await fetch(DB+"/"+p+".json", {method:"POST", body:JSON.stringify(d), headers:{"Content-Type":"application/json"}}); }
async function dbUpdate(p,d) { await fetch(DB+"/"+p+".json", {method:"PATCH", body:JSON.stringify(d), headers:{"Content-Type":"application/json"}}); }
// ═══════════════════════════════════════════════

const BLUE="#2563eb";
const AVATARS=["🧑‍🎓","👩‍💻","🏀","📚","🎨","🎵","🎮","🏄","☕","🌟","🦊","🐱","🎯","🚀","💡","🌈","🎸","📸","🍕","⚡","🌺","🎪","🏆","🎭","🌙","🦋","🍀","🔥","💎","🌊"];
const CAT_KEYS=["Laundry","Food","Moving","Shopping","Errands","Tutoring"];
const CAT_ICON_MAP={Laundry:"laundry",Food:"food",Moving:"moving",Shopping:"shopping",Errands:"errands",Tutoring:"tutoring",Other:"other"};
const CAT_LABELS={Laundry:"Laundry",Food:"Food Run",Moving:"Moving",Shopping:"Shopping",Errands:"Errands",Tutoring:"Tutoring"};

const CatIcons={
  laundry:(sz=24,c="#1f2937")=><svg width={sz} height={sz} viewBox="0 0 32 32" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="24" height="28" rx="3"/><circle cx="16" cy="18" r="7"/><path d="M13 16.5c1-1.5 3.5-1.5 5 0s1.5 3.5 0 5"/><circle cx="8" cy="6" r="1" fill={c} stroke="none"/><circle cx="12" cy="6" r="1" fill={c} stroke="none"/></svg>,
  food:(sz=24,c="#1f2937")=><svg width={sz} height={sz} viewBox="0 0 32 32" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 16h24"/><path d="M6 16c0-6 4-10 10-10s10 4 10 10"/><path d="M4 16c0 2 1 4 3 4h18c2 0 3-2 3-4"/><line x1="6" y1="24" x2="26" y2="24"/><line x1="10" y1="20" x2="10" y2="24"/><line x1="22" y1="20" x2="22" y2="24"/></svg>,
  moving:(sz=24,c="#1f2937")=><svg width={sz} height={sz} viewBox="0 0 32 32" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M16 6c-3 0-5.5 2-5.5 4.5S13 14 13 17h6c0-3 2.5-4.5 2.5-6.5S19 6 16 6z"/><line x1="16" y1="17" x2="16" y2="22"/><line x1="10" y1="22" x2="22" y2="22"/><path d="M10 22c-1 2-2 4-2 6h16c0-2-1-4-2-6"/><line x1="12" y1="11" x2="8" y2="8"/><line x1="20" y1="11" x2="24" y2="8"/></svg>,
  shopping:(sz=24,c="#1f2937")=><svg width={sz} height={sz} viewBox="0 0 32 32" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8h3l3 14h12l3-10H10"/><circle cx="13" cy="26" r="2"/><circle cx="23" cy="26" r="2"/></svg>,
  errands:(sz=24,c="#1f2937")=><svg width={sz} height={sz} viewBox="0 0 32 32" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="4" width="22" height="24" rx="2"/><line x1="10" y1="10" x2="13" y2="10"/><line x1="16" y1="10" x2="22" y2="10"/><line x1="10" y1="15" x2="13" y2="15"/><line x1="16" y1="15" x2="22" y2="15"/><line x1="10" y1="20" x2="13" y2="20"/><line x1="16" y1="20" x2="22" y2="20"/></svg>,
  tutoring:(sz=24,c="#1f2937")=><svg width={sz} height={sz} viewBox="0 0 32 32" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12l12-6 12 6-12 6-12-6z"/><path d="M8 14v6c0 2 3.5 4 8 4s8-2 8-4v-6"/><line x1="28" y1="12" x2="28" y2="22"/></svg>,
  other:(sz=24,c="#1f2937")=><svg width={sz} height={sz} viewBox="0 0 32 32" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="16" cy="16" r="12"/><line x1="16" y1="10" x2="16" y2="16"/><line x1="16" y1="16" x2="20" y2="20"/></svg>,
};
const Nav={
  home:a=><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={a?"#2563eb":"#bbb"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  search:a=><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={a?"#2563eb":"#bbb"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  plus:()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  chat:a=><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={a?"#2563eb":"#bbb"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
  user:a=><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={a?"#2563eb":"#bbb"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  back:()=><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f2937" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
  send:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>,
  chev:()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ddd" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>,
  pin:()=><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#bbb" strokeWidth="2" strokeLinecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  veri:()=><svg width="13" height="13" viewBox="0 0 24 24" fill="#2563eb" stroke="white" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10" fill="none" stroke="white" strokeWidth="2.5"/></svg>,
  shield:()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  star:f=><svg width="11" height="11" viewBox="0 0 24 24" fill={f?"#f59e0b":"none"} stroke="#f59e0b" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
  coin:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2"><circle cx="12" cy="12" r="10"/><text x="12" y="16" textAnchor="middle" fontSize="11" fontWeight="800" fill="#f59e0b" stroke="none">C</text></svg>,
};

function Stars({rating,count}){return <span style={{display:"inline-flex",alignItems:"center",gap:1}}>{[1,2,3,4,5].map(i=><span key={i}>{Nav.star(i<=Math.round(rating))}</span>)}{count!==undefined&&<span style={{fontSize:11,color:"#bbb",marginLeft:3}}>({count})</span>}</span>;}

// ═══ LOGIN ═══
function LoginScreen({onLogin}){
  const [scr,setScr]=useState("splash");const [name,setName]=useState("");const [email,setEmail]=useState("");const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const inp={width:"100%",padding:"14px 16px",borderRadius:12,border:"1px solid #e5e7eb",fontSize:15,boxSizing:"border-box",outline:"none",background:"#fafafa"};
  const doSignup=async()=>{if(!name.trim()){setErr("Enter your name");return;}setLoading(true);try{const uid=name.trim().toLowerCase().replace(/[^a-z0-9]/g,"")+"_"+Date.now().toString(36);const av=AVATARS[Math.floor(Math.random()*AVATARS.length)];await dbWrite("users/"+uid,{id:uid,name:name.trim(),avatar:av,rating:0,reviews:0,verified:true,joined:new Date().toLocaleDateString("en-US",{month:"short",year:"numeric"}),tasksCompleted:0,credits:100,bio:email||"CampusTask user"});localStorage.setItem("ct_uid",uid);setLoading(false);onLogin(uid);}catch(e){setLoading(false);setErr("Connection error — check WiFi");}};
  const doLogin=async()=>{if(!name.trim()){setErr("Enter your name");return;}setLoading(true);try{const allUsers=await dbGet("users");const found=Object.entries(allUsers||{}).find(([k,v])=>v.name===name.trim());if(found){const uid=found[0];localStorage.setItem("ct_uid",uid);setLoading(false);onLogin(uid);}else{setLoading(false);setErr("Name not found — try Sign Up");}}catch(e){setLoading(false);setErr("Connection error — check WiFi");}};

  if(scr==="splash") return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"white",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
      <h1 style={{fontSize:42,fontWeight:800,margin:"0 0 6px",color:BLUE,letterSpacing:"-1.5px"}}>CampusTask</h1>
      <p style={{fontSize:15,color:"#999",margin:"0 0 56px"}}>Get stuff done. Get paid.</p>
      <button onClick={()=>setScr("signup")} style={{width:"100%",padding:16,borderRadius:14,border:"none",background:"#1f2937",color:"white",fontWeight:700,fontSize:16,cursor:"pointer",marginBottom:12}}>Get Started</button>
      <button onClick={()=>setScr("login")} style={{width:"100%",padding:16,borderRadius:14,border:"1.5px solid #e5e7eb",background:"white",color:"#1f2937",fontWeight:600,fontSize:16,cursor:"pointer"}}>I have an account</button>
      <div style={{marginTop:56,display:"flex",gap:20,fontSize:11,color:"#bbb"}}><span>100 free credits</span><span>·</span><span>Live sync</span><span>·</span><span>Real classmates</span></div>
    </div>);
  if(scr==="login") return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"white",padding:"0 24px"}}>
      <div style={{paddingTop:60}}><button onClick={()=>{setScr("splash");setErr("");}} style={{background:"none",border:"none",cursor:"pointer",padding:0}}>{Nav.back()}</button></div>
      <h2 style={{fontSize:28,fontWeight:800,margin:"24px 0 4px"}}>Welcome back</h2>
      <p style={{fontSize:14,color:"#999",margin:"0 0 32px"}}>Enter the name you signed up with</p>
      {err&&<div style={{background:"#fef2f2",color:"#dc2626",padding:"8px 12px",borderRadius:8,fontSize:13,marginBottom:12}}>{err}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <input style={inp} placeholder="Your name (exact)" value={name} onChange={e=>{setName(e.target.value);setErr("");}} />
        <button onClick={doLogin} disabled={loading} style={{width:"100%",padding:16,borderRadius:14,border:"none",background:BLUE,color:"white",fontWeight:700,fontSize:16,cursor:"pointer",opacity:loading?0.6:1}}>{loading?"Finding you...":"Sign In"}</button>
        <p style={{textAlign:"center",fontSize:13,color:"#999"}}>New? <span onClick={()=>{setScr("signup");setErr("");}} style={{color:BLUE,fontWeight:600,cursor:"pointer"}}>Sign Up</span></p>
      </div></div>);
  return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"white",padding:"0 24px"}}>
      <div style={{paddingTop:60}}><button onClick={()=>{setScr("splash");setErr("");}} style={{background:"none",border:"none",cursor:"pointer",padding:0}}>{Nav.back()}</button></div>
      <h2 style={{fontSize:28,fontWeight:800,margin:"24px 0 4px"}}>Join CampusTask</h2>
      <p style={{fontSize:14,color:"#999",margin:"0 0 32px"}}>You get 100 credits to start</p>
      {err&&<div style={{background:"#fef2f2",color:"#dc2626",padding:"8px 12px",borderRadius:8,fontSize:13,marginBottom:12}}>{err}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <input style={inp} placeholder="Your name (visible to everyone)" value={name} onChange={e=>{setName(e.target.value);setErr("");}} />
        <input style={inp} placeholder="School email (optional)" value={email} onChange={e=>setEmail(e.target.value)} />
        <div style={{padding:12,background:"#f0fdf4",borderRadius:10,display:"flex",alignItems:"center",gap:8}}>{Nav.coin()} <span style={{fontSize:13,color:"#16a34a",fontWeight:600}}>You'll start with 100 CampusTask Credits</span></div>
        <button onClick={doSignup} disabled={loading} style={{width:"100%",padding:16,borderRadius:14,border:"none",background:BLUE,color:"white",fontWeight:700,fontSize:16,cursor:"pointer",opacity:loading?0.6:1}}>{loading?"Creating...":"Create Account"}</button>
        <p style={{textAlign:"center",fontSize:13,color:"#999"}}>Already joined? <span onClick={()=>{setScr("login");setErr("");}} style={{color:BLUE,fontWeight:600,cursor:"pointer"}}>Sign In</span></p>
      </div></div>);
}

// ═══ SHARED COMPONENTS ═══
function Overlay({children,onClose}){return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(2px)"}} onClick={onClose}><div style={{background:"white",borderRadius:"20px 20px 0 0",padding:"20px 24px 32px",width:"100%",maxWidth:430,maxHeight:"85vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}><div style={{width:36,height:4,borderRadius:2,background:"#e5e5e5",margin:"0 auto 16px"}}/>{children}</div></div>;}

function CategoryRow({catKey,count,onClick}){const Ic=CatIcons[CAT_ICON_MAP[catKey]||"other"];return <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 0",borderBottom:"1px solid #f5f5f5",cursor:"pointer"}}><div style={{width:42,height:42,borderRadius:12,border:"1.5px solid #e5e5e5",display:"flex",alignItems:"center",justifyContent:"center"}}>{Ic(22,"#1f2937")}</div><div style={{flex:1}}><div style={{fontWeight:600,fontSize:15}}>{CAT_LABELS[catKey]||catKey}</div><div style={{fontSize:12,color:"#bbb",marginTop:1}}>{count} available</div></div>{Nav.chev()}</div>;}

function TaskCard({task,users,myId,onClaim,onComplete,onReview,onProfile,onMessage}){
  const p=users[task.postedBy]||{name:"?",avatar:"❓",verified:false};const cl=task.claimedBy?(users[task.claimedBy]||{name:"?"}):null;const Ic=CatIcons[CAT_ICON_MAP[task.category]||"other"];const isMyP=task.postedBy===myId;const isMyCl=task.claimedBy===myId;
  return <div style={{display:"flex",alignItems:"flex-start",gap:12,padding:"14px 0",borderBottom:"1px solid #f5f5f5"}}>
    <div style={{width:38,height:38,borderRadius:10,border:"1.5px solid #eee",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{Ic(20,"#999")}</div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}><div style={{fontWeight:600,fontSize:14}}>{task.title}</div><div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0,marginLeft:8}}>{Nav.coin()}<span style={{fontWeight:800,fontSize:16}}>{task.price}</span></div></div>
      <div style={{fontSize:12,color:"#999",marginTop:2,lineHeight:1.4}}>{task.desc}</div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}} onClick={()=>onProfile(p)}><span style={{fontSize:12}}>{p.avatar}</span><span style={{fontSize:12,color:"#666"}}>{p.name}</span>{p.verified&&Nav.veri()}</div>
        <span style={{color:"#e5e5e5"}}>·</span><div style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#bbb"}}>{Nav.pin()}{task.location}</div>
      </div>
      {task.status==="open"&&!isMyP&&<div style={{display:"flex",gap:8,marginTop:10}}><button onClick={()=>onClaim(task)} style={{padding:"7px 16px",borderRadius:8,border:"none",background:"#1f2937",color:"white",fontWeight:600,fontSize:12,cursor:"pointer"}}>Claim · earn {Math.round(task.price*0.8)}c</button><button onClick={()=>onMessage(task.postedBy)} style={{padding:"7px 12px",borderRadius:8,border:"1.5px solid #eee",background:"white",cursor:"pointer",display:"flex",alignItems:"center"}}>{Nav.chat(false)}</button></div>}
      {task.status==="open"&&isMyP&&<div style={{fontSize:12,color:"#bbb",marginTop:8,fontStyle:"italic"}}>Waiting for someone to claim...</div>}
      {task.status==="claimed"&&isMyCl&&<div style={{display:"flex",gap:8,marginTop:10}}><button onClick={()=>onComplete(task)} style={{padding:"7px 16px",borderRadius:8,border:"none",background:"#16a34a",color:"white",fontWeight:600,fontSize:12,cursor:"pointer"}}>Mark Complete</button><button onClick={()=>onMessage(task.postedBy)} style={{padding:"7px 12px",borderRadius:8,border:"1.5px solid #eee",background:"white",cursor:"pointer",display:"flex",alignItems:"center"}}>{Nav.chat(false)}</button></div>}
      {task.status==="claimed"&&isMyP&&cl&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:10}}><span style={{fontSize:12,color:BLUE}}>{cl.name} is on it</span><button onClick={()=>onMessage(task.claimedBy)} style={{padding:"5px 10px",borderRadius:6,border:"1.5px solid #eee",background:"white",cursor:"pointer",fontSize:11}}>Message</button></div>}
      {task.status==="completed"&&isMyP&&!task.reviewed&&<button onClick={()=>onReview(task)} style={{marginTop:10,padding:"7px 16px",borderRadius:8,border:"none",background:"#1f2937",color:"white",fontWeight:600,fontSize:12,cursor:"pointer"}}>Leave a Review</button>}
      {task.status==="completed"&&isMyCl&&!task.reviewed&&<div style={{fontSize:12,color:"#16a34a",marginTop:8}}>Complete — waiting for review</div>}
      {task.reviewText&&<div style={{marginTop:8,fontSize:12,color:"#999"}}><Stars rating={task.reviewRating||5}/> "{task.reviewText}"</div>}
    </div></div>;
}

function ProfileCard({user,onClose,onMessage}){return <Overlay onClose={onClose}><div style={{display:"flex",gap:14,alignItems:"center"}}><div style={{width:56,height:56,borderRadius:"50%",background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>{user.avatar}</div><div><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontWeight:700,fontSize:18}}>{user.name}</span>{user.verified&&Nav.veri()}</div><div style={{fontSize:12,color:"#999",marginTop:2}}>Joined {user.joined} · {user.tasksCompleted||0} tasks</div><div style={{display:"flex",alignItems:"center",gap:4,marginTop:3}}>{Nav.coin()}<span style={{fontWeight:700}}>{user.credits||0} credits</span></div></div></div><p style={{fontSize:13,color:"#666",margin:"14px 0 0",lineHeight:1.5}}>{user.bio}</p><div style={{display:"flex",gap:10,marginTop:18}}><button onClick={()=>{onClose();onMessage(user.id);}} style={{flex:1,padding:14,borderRadius:12,border:"none",background:"#1f2937",color:"white",fontWeight:600,cursor:"pointer"}}>Message</button><button onClick={onClose} style={{flex:1,padding:14,borderRadius:12,border:"none",background:"#f5f5f5",fontWeight:600,cursor:"pointer",color:"#666"}}>Close</button></div></Overlay>;}

function PostTaskForm({onPost,onCancel,credits}){
  const [title,setT]=useState("");const [desc,setD]=useState("");const [price,setP]=useState("");const [cat,setCat]=useState("Errands");const [loc,setL]=useState("");
  const pn=parseInt(price)||0;const ok=pn>0&&pn<=credits;
  const inp={width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid #e5e7eb",fontSize:14,boxSizing:"border-box",outline:"none",background:"#fafafa"};
  return <Overlay onClose={onCancel}><h3 style={{margin:"0 0 16px",fontSize:20,fontWeight:700}}>New Task</h3><div style={{display:"flex",flexDirection:"column",gap:12}}>
    <input style={inp} placeholder="What do you need done?" value={title} onChange={e=>setT(e.target.value)}/>
    <textarea style={{...inp,minHeight:60,resize:"none"}} placeholder="Add details..." value={desc} onChange={e=>setD(e.target.value)}/>
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{CAT_KEYS.map(c=>{const ik=CAT_ICON_MAP[c];const a=cat===c;return <button key={c} onClick={()=>setCat(c)} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:8,border:a?"1.5px solid #1f2937":"1.5px solid #eee",background:a?"#1f2937":"white",color:a?"white":"#999",fontSize:11,fontWeight:500,cursor:"pointer"}}>{CatIcons[ik](14,a?"white":"#999")}{CAT_LABELS[c]}</button>;})}</div>
    <div style={{display:"flex",gap:10}}><input type="number" style={{...inp,flex:1}} placeholder="Credits" value={price} onChange={e=>setP(e.target.value)}/><input style={{...inp,flex:1}} placeholder="Location" value={loc} onChange={e=>setL(e.target.value)}/></div>
    {pn>0&&<div style={{padding:10,background:ok?"#f0fdf4":"#fef2f2",borderRadius:8,fontSize:12,color:ok?"#16a34a":"#dc2626",display:"flex",alignItems:"center",gap:6}}>{Nav.coin()}{ok?<span>Tasker earns <strong>{Math.round(pn*0.8)}c</strong> · Fee {Math.round(pn*0.2)}c · You have {credits}c</span>:<span>Not enough credits ({credits}c)</span>}</div>}
    <button onClick={()=>{if(title&&desc&&pn>0&&loc&&ok)onPost({title,desc,price:pn,category:cat,location:loc});}} style={{padding:14,borderRadius:12,border:"none",background:title&&desc&&ok&&loc?"#1f2937":"#eee",color:title&&desc&&ok&&loc?"white":"#bbb",fontWeight:700,cursor:"pointer",fontSize:15}}>Post Task</button>
  </div></Overlay>;
}

function ReviewModal({task,users,onSubmit,onCancel}){const [r,setR]=useState(5);const [t,setTx]=useState("");const tk=users[task.claimedBy]||{name:"?"};return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(2px)"}} onClick={onCancel}><div style={{background:"white",borderRadius:18,padding:24,width:"88%",maxWidth:360}} onClick={e=>e.stopPropagation()}><h3 style={{margin:0,fontSize:18,textAlign:"center"}}>Review {tk.name}</h3><p style={{fontSize:12,color:"#999",textAlign:"center",margin:"4px 0 16px"}}>{task.title}</p><div style={{textAlign:"center",marginBottom:16}}>{[1,2,3,4,5].map(i=><span key={i} onClick={()=>setR(i)} style={{fontSize:34,cursor:"pointer",color:i<=r?"#f59e0b":"#eee"}}>★</span>)}</div><textarea style={{width:"100%",padding:12,borderRadius:10,border:"1px solid #eee",fontSize:14,minHeight:50,resize:"none",boxSizing:"border-box",background:"#fafafa"}} placeholder="How did it go?" value={t} onChange={e=>setTx(e.target.value)}/><button onClick={()=>onSubmit(r,t)} style={{marginTop:14,width:"100%",padding:14,borderRadius:12,border:"none",background:"#1f2937",color:"white",fontWeight:700,cursor:"pointer"}}>Submit Review</button></div></div>;}

// ═══ MESSAGES ═══
function ConvList({myId,convs,users,onOpen}){
  const list=Object.entries(convs||{}).filter(([k])=>k.includes(myId)).map(([k,v])=>{const oid=k.split("__").find(i=>i!==myId);const ms=v?Object.values(v).sort((a,b)=>(a.ts||0)-(b.ts||0)):[];const last=ms[ms.length-1];const ur=ms.filter(m=>m.from!==myId&&!m.read).length;return{key:k,oid,ms,last,ur};}).sort((a,b)=>(b.last?.ts||0)-(a.last?.ts||0));
  if(!list.length) return <div style={{textAlign:"center",padding:"60px 20px",color:"#bbb"}}><p style={{fontSize:15,color:"#999"}}>No messages yet</p><p style={{fontSize:13}}>Tap the chat icon on any task</p></div>;
  return <div>{list.map(c=>{const u=users[c.oid]||{name:"?",avatar:"❓"};return <div key={c.key} onClick={()=>onOpen(c.oid)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px",cursor:"pointer",borderBottom:"1px solid #f5f5f5"}}><div style={{position:"relative"}}><div style={{width:44,height:44,borderRadius:"50%",background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{u.avatar}</div>{c.ur>0&&<div style={{position:"absolute",top:-1,right:-1,width:15,height:15,borderRadius:"50%",background:BLUE,color:"white",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{c.ur}</div>}</div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:c.ur?700:500,fontSize:14}}>{u.name}</span><span style={{fontSize:11,color:"#ccc"}}>{c.last?.timeStr||""}</span></div><div style={{fontSize:13,color:c.ur?"#1f2937":"#bbb",fontWeight:c.ur?500:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{c.last?.from===myId?"You: ":""}{c.last?.text||""}</div></div></div>;})}</div>;
}

function ChatView({myId,otherId,convs,users,onBack,onSend}){
  const [input,setI]=useState("");const endRef=useRef(null);const u=users[otherId]||{name:"?",avatar:"❓",verified:false};const ck=[myId,otherId].sort().join("__");const cv=convs[ck];const ms=cv?Object.values(cv).sort((a,b)=>(a.ts||0)-(b.ts||0)):[];
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[ms.length]);
  const send=()=>{if(input.trim()){onSend(otherId,input.trim());setI("");}};
  return <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#fafafa"}}>
    <div style={{background:"white",padding:"12px 16px",borderBottom:"1px solid #f0f0f0",display:"flex",alignItems:"center",gap:10}}><button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",padding:4}}>{Nav.back()}</button><div style={{width:32,height:32,borderRadius:"50%",background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{u.avatar}</div><span style={{fontWeight:600,fontSize:14}}>{u.name}</span>{u.verified&&Nav.veri()}</div>
    <div style={{textAlign:"center",padding:"8px 0 0"}}><span style={{fontSize:10,color:"#ccc"}}>{Nav.shield()} Messages logged for protection</span></div>
    <div style={{flex:1,overflow:"auto",padding:"8px 16px",display:"flex",flexDirection:"column",gap:4}}>
      {ms.map((m,i)=>{const me=m.from===myId;return <div key={i} style={{display:"flex",justifyContent:me?"flex-end":"flex-start"}}><div style={{maxWidth:"75%",padding:"10px 14px",fontSize:14,lineHeight:1.4,borderRadius:me?"16px 16px 4px 16px":"16px 16px 16px 4px",background:me?"#1f2937":"white",color:me?"white":"#1f2937",boxShadow:me?"none":"0 1px 2px rgba(0,0,0,0.04)"}}>{m.text}<div style={{fontSize:10,marginTop:3,opacity:0.4,textAlign:"right"}}>{m.timeStr}</div></div></div>;})}
      <div ref={endRef}/>
    </div>
    <div style={{padding:"10px 16px 20px",background:"white",borderTop:"1px solid #f0f0f0",display:"flex",gap:8}}><input value={input} onChange={e=>setI(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send();}} placeholder="Message..." style={{flex:1,padding:"10px 16px",borderRadius:20,border:"1px solid #eee",fontSize:14,outline:"none",background:"#fafafa"}}/><button onClick={send} style={{width:36,height:36,borderRadius:"50%",border:"none",background:input.trim()?"#1f2937":"#eee",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{Nav.send()}</button></div>
  </div>;
}

// ═══ PROFILE ═══
function ProfileTab({user,onLogout}){return <div style={{padding:"32px 24px"}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:28}}><div style={{width:72,height:72,borderRadius:"50%",background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,marginBottom:10}}>{user.avatar}</div><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontWeight:700,fontSize:20}}>{user.name}</span>{user.verified&&Nav.veri()}</div><span style={{fontSize:13,color:"#999",marginTop:2}}>{user.bio}</span></div><div style={{display:"flex",gap:12,marginBottom:28}}><div style={{flex:1,background:"#fafafa",borderRadius:14,padding:16,textAlign:"center"}}><div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{Nav.coin()}<span style={{fontSize:24,fontWeight:800}}>{user.credits||0}</span></div><div style={{fontSize:11,color:"#bbb",marginTop:2}}>Credits</div></div><div style={{flex:1,background:"#fafafa",borderRadius:14,padding:16,textAlign:"center"}}><div style={{fontSize:24,fontWeight:800}}>{user.tasksCompleted||0}</div><div style={{fontSize:11,color:"#bbb",marginTop:2}}>Tasks</div></div></div>{["Payment Methods","Trust & Verification","Dispute History","Settings"].map(x=><div key={x} style={{display:"flex",alignItems:"center",padding:"15px 0",borderBottom:"1px solid #f5f5f5",cursor:"pointer"}}><span style={{fontSize:14,flex:1}}>{x}</span>{Nav.chev()}</div>)}<button onClick={onLogout} style={{marginTop:24,width:"100%",padding:14,borderRadius:12,border:"1.5px solid #eee",background:"white",color:"#dc2626",fontWeight:600,cursor:"pointer",fontSize:14}}>Sign Out</button></div>;}

// ═══════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════
function CampusTask(){
  const [myId,setMyId]=useState(localStorage.getItem("ct_uid"));
  const [users,setUsers]=useState({});const [tasks,setTasks]=useState({});const [convs,setConvs]=useState({});
  const [tab,setTab]=useState("home");const [filter,setFilter]=useState(null);
  const [showPost,setShowPost]=useState(false);const [showProf,setShowProf]=useState(null);const [revTask,setRevTask]=useState(null);
  const [note,setNote]=useState(null);const [activeChat,setActiveChat]=useState(null);
  const notify=m=>{setNote(m);setTimeout(()=>setNote(null),2500);};
  const me=users[myId]||{};

  // Poll Firebase every 1.5s for real-time sync across all phones
  useEffect(()=>{
    if(!myId)return;
    let active=true;
    const poll=async()=>{
      try{
        const [u,t,m]=await Promise.all([dbGet("users"),dbGet("tasks"),dbGet("messages")]);
        if(!active)return;
        setUsers(u||{});
        setTasks(t||{});
        setConvs(m||{});
      }catch(e){}
    };
    poll();
    const id=setInterval(poll,1500);
    return()=>{active=false;clearInterval(id);};
  },[myId]);

  // Check saved session
  useEffect(()=>{
    const s=localStorage.getItem("ct_uid");
    if(s){
      dbGet("users/"+s).then(u=>{
        if(u)setMyId(s);
        else{localStorage.removeItem("ct_uid");setMyId(null);}
      }).catch(()=>{});
    }
  },[]);

  if(!myId) return <LoginScreen onLogin={uid=>setMyId(uid)}/>;

  const tl=Object.values(tasks).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const totalUr=Object.entries(convs||{}).filter(([k])=>k.includes(myId)).reduce((s,[k,v])=>{const ms=v?Object.values(v):[];return s+ms.filter(m=>m.from!==myId&&!m.read).length;},0);
  const cc={};CAT_KEYS.forEach(k=>{cc[k]=tl.filter(t=>t.category===k&&t.status==="open").length;});
  const vis=filter?tl.filter(t=>t.category===filter):(tab==="my"?tl.filter(t=>t.postedBy===myId||t.claimedBy===myId):tl.filter(t=>t.status==="open"));

  const doClaim=async task=>{await dbUpdate("tasks/"+task.id,{status:"claimed",claimedBy:myId});notify("Claimed — credits in escrow");};
  const doComplete=async task=>{const earn=Math.round(task.price*0.8);await dbUpdate("tasks/"+task.id,{status:"completed"});await dbUpdate("users/"+myId,{credits:(me.credits||0)+earn,tasksCompleted:(me.tasksCompleted||0)+1});notify("+"+earn+" credits earned!");};
  const doPost=async d=>{const tid="t_"+Date.now().toString(36);await dbWrite("tasks/"+tid,{id:tid,...d,postedBy:myId,claimedBy:null,status:"open",createdAt:Date.now(),reviewed:false,reviewText:"",reviewRating:0});await dbUpdate("users/"+myId,{credits:(me.credits||0)-d.price});setShowPost(false);notify(d.price+"c deducted — task posted!");};
  const doReview=async(r,t)=>{await dbUpdate("tasks/"+revTask.id,{reviewed:true,reviewRating:r,reviewText:t});setRevTask(null);notify("Review submitted!");};
  const openMsg=uid=>{setActiveChat(uid);setTab("messages");};
  const sendMsg=async(uid,txt)=>{const ck=[myId,uid].sort().join("__");const ts=new Date().toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});await dbPush("messages/"+ck,{from:myId,text:txt,timeStr:ts,ts:Date.now(),read:false});};
  const logout=()=>{localStorage.removeItem("ct_uid");setMyId(null);};

  if(activeChat&&tab==="messages") return <div style={{maxWidth:430,margin:"0 auto"}}><ChatView myId={myId} otherId={activeChat} convs={convs} users={users} onBack={()=>setActiveChat(null)} onSend={sendMsg}/></div>;

  return <div style={{maxWidth:430,margin:"0 auto",background:"white",minHeight:"100vh",paddingBottom:80}}>
    {note&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"#1f2937",color:"white",padding:"10px 20px",borderRadius:12,fontSize:13,fontWeight:600,zIndex:200}}>{note}</div>}
    <div style={{padding:"18px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <h1 style={{margin:0,fontSize:26,fontWeight:800,color:BLUE,letterSpacing:"-0.5px"}}>{tab==="home"?"CampusTask":tab==="my"?"My Tasks":tab==="messages"?"Messages":"Profile"}</h1>
      {tab==="home"&&<div style={{display:"flex",alignItems:"center",gap:4}}>{Nav.coin()}<span style={{fontWeight:700,fontSize:14}}>{me.credits||0}</span></div>}
    </div>

    {tab==="home"&&<div style={{padding:"0 20px"}}>
      {!filter&&CAT_KEYS.map(k=><CategoryRow key={k} catKey={k} count={cc[k]} onClick={()=>setFilter(k)}/>)}
      {filter&&<><button onClick={()=>setFilter(null)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",padding:"0 0 10px",fontSize:13,color:BLUE,fontWeight:600}}>{Nav.back()} All categories</button><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>{CatIcons[CAT_ICON_MAP[filter]](28,"#1f2937")}<div><div style={{fontWeight:700,fontSize:18}}>{CAT_LABELS[filter]}</div><div style={{fontSize:12,color:"#bbb"}}>{cc[filter]} available</div></div></div></>}
      {!filter&&<div style={{marginTop:20}}><div style={{fontSize:11,fontWeight:700,color:"#ccc",letterSpacing:1.2,marginBottom:8}}>RECENT</div></div>}
      {vis.length===0?<div style={{textAlign:"center",padding:32,color:"#bbb"}}>No tasks yet — post one!</div>:vis.map(t=><TaskCard key={t.id} task={t} users={users} myId={myId} onClaim={doClaim} onComplete={doComplete} onReview={()=>setRevTask(t)} onProfile={u=>setShowProf(u)} onMessage={openMsg}/>)}
    </div>}

    {tab==="my"&&<div style={{padding:"0 20px"}}>{vis.length===0?<div style={{textAlign:"center",padding:48,color:"#bbb"}}>No tasks yet</div>:vis.map(t=><TaskCard key={t.id} task={t} users={users} myId={myId} onClaim={doClaim} onComplete={doComplete} onReview={()=>setRevTask(t)} onProfile={u=>setShowProf(u)} onMessage={openMsg}/>)}</div>}
    {tab==="messages"&&!activeChat&&<ConvList myId={myId} convs={convs} users={users} onOpen={openMsg}/>}
    {tab==="profile"&&<ProfileTab user={me} onLogout={logout}/>}

    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"white",borderTop:"1px solid #f0f0f0",display:"flex",alignItems:"center",justifyContent:"space-around",padding:"6px 0 12px",zIndex:90}}>
      <button onClick={()=>{setTab("home");setFilter(null);setActiveChat(null);}} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 12px"}}>{Nav.home(tab==="home")}</button>
      <button onClick={()=>{setTab("my");setFilter(null);setActiveChat(null);}} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 12px"}}>{Nav.search(tab==="my")}</button>
      <button onClick={()=>setShowPost(true)} style={{width:42,height:42,borderRadius:"50%",background:"#1f2937",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:-10,boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>{Nav.plus()}</button>
      <button onClick={()=>{setTab("messages");setActiveChat(null);}} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 12px",position:"relative"}}>{Nav.chat(tab==="messages")}{totalUr>0&&<div style={{position:"absolute",top:0,right:6,width:14,height:14,borderRadius:"50%",background:BLUE,color:"white",fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{totalUr}</div>}</button>
      <button onClick={()=>{setTab("profile");setFilter(null);setActiveChat(null);}} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 12px"}}>{Nav.user(tab==="profile")}</button>
    </div>

    {showPost&&<PostTaskForm onPost={doPost} onCancel={()=>setShowPost(false)} credits={me.credits||0}/>}
    {showProf&&<ProfileCard user={showProf} onClose={()=>setShowProf(null)} onMessage={openMsg}/>}
    {revTask&&<ReviewModal task={revTask} users={users} onSubmit={doReview} onCancel={()=>setRevTask(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(CampusTask));
  </script>
</body>
</html>
